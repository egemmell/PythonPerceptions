# Configuration for street view segmentation analysis

paths:
  image_dir: "data/images"
  results_dir: "results"
  metadata_file: "data/metadata/ratings.csv"

models:
  yolo_coco:
    model_name: "yolo11n.pt"  # Options: yolo11n, yolo11s, yolo11m, yolo11l
    conf_threshold: 0.25
    device: "cpu"  # Options: "cpu", "cuda", 0, 1, etc.
    
  yolo_openimages:
    model_name: "yolov8s-oiv7.pt"
    conf_threshold: 0.25
    device: "cpu"
    classes_of_interest: ["Tree", "Car", "Truck", "Person", "Building"]
    
  oneformer:
    model_name: "shi-labs/oneformer_cityscapes_swin_large"
    dataset: "cityscapes"  # Options: "cityscapes", "coco", "ade20k"
    device: "cpu"
    task: "panoptic"  # Options: "semantic", "instance", "panoptic"

processing:
  batch_size: 1
  save_visualizations: false
  image_formats: [".jpg", ".jpeg", ".png"]

analysis:
  classes_of_interest:
    things: ["person", "car", "truck", "bus", "dog", "bicycle"]
    stuff: ["tree", "vegetation", "building", "road", "sky"]