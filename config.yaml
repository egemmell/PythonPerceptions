# Configuration for street view segmentation analysis

paths:
  image_dir: "data/images"
  results_dir: "results"
  metadata_file: "data/metadata/ratings.csv"

models:
  yolo_coco:
    model_name: "yolo26x.pt"    # Custom model for 12 classes (everything except trees)
    conf_threshold: 0.25
    device: "cpu"              # ← Changed from "cpu"
    classes_of_interest: 
      - person
      - car
      - truck
      - bus
      - dog
      - bicycle
      - bench
      - motorcycle
      - traffic light
      - stop sign
      - parking meter
    
  yolo_openimages:
    model_name: "yolov8s-oiv7.pt"
    conf_threshold: 0.25
    device: "cpu"              # ← Changed from "gpu"
    # Only these classes will be included in output
    # Note: Open Images uses title case for class names
    classes_of_interest:
      - Tree
    
  oneformer:
    model_name: "shi-labs/oneformer_cityscapes_swin_large"
    dataset: "cityscapes"
    device: "cpu"              # ← Changed from "cpu"
    task: "panoptic"
    # No filtering - output all 19 Cityscapes classes

processing:
  batch_size: 1
  save_visualizations: false
  image_formats: [".jpg", ".jpeg", ".png"]